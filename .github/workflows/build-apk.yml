name: Build Visura Cam APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Gradle and generate wrapper
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Generate Gradle wrapper files
        run: gradle wrapper --gradle-version 8.4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Create assets folder and placeholder model
        run: |
          mkdir -p app/src/main/assets
          echo "placeholder" > app/src/main/assets/scene_detector.tflite

      # Install ImageMagick so we can generate PNG icons
      - name: Install ImageMagick
        run: sudo apt-get install -y imagemagick

      # Generate app icons — yellow-green squares (Visura Cam accent color)
      - name: Generate app icons
        run: |
          mkdir -p app/src/main/res/mipmap-mdpi
          mkdir -p app/src/main/res/mipmap-hdpi
          mkdir -p app/src/main/res/mipmap-xhdpi
          mkdir -p app/src/main/res/mipmap-xxhdpi
          mkdir -p app/src/main/res/mipmap-xxxhdpi
          convert -size 48x48   xc:"#B8F026" PNG24:app/src/main/res/mipmap-mdpi/ic_launcher.png
          convert -size 48x48   xc:"#B8F026" PNG24:app/src/main/res/mipmap-mdpi/ic_launcher_round.png
          convert -size 72x72   xc:"#B8F026" PNG24:app/src/main/res/mipmap-hdpi/ic_launcher.png
          convert -size 72x72   xc:"#B8F026" PNG24:app/src/main/res/mipmap-hdpi/ic_launcher_round.png
          convert -size 96x96   xc:"#B8F026" PNG24:app/src/main/res/mipmap-xhdpi/ic_launcher.png
          convert -size 96x96   xc:"#B8F026" PNG24:app/src/main/res/mipmap-xhdpi/ic_launcher_round.png
          convert -size 144x144 xc:"#B8F026" PNG24:app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          convert -size 144x144 xc:"#B8F026" PNG24:app/src/main/res/mipmap-xxhdpi/ic_launcher_round.png
          convert -size 192x192 xc:"#B8F026" PNG24:app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          convert -size 192x192 xc:"#B8F026" PNG24:app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.png
          echo "Icons generated:"
          ls -la app/src/main/res/mipmap-xxhdpi/

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.workers.max=2"

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: visura-cam-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Show APK info
        run: |
          echo "✅ Build complete!"
          ls -lh app/build/outputs/apk/debug/
